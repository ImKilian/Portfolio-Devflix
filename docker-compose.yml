services:
  db:
    image: postgres:16-alpine
    container_name: devflix_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: devflix
      POSTGRES_PASSWORD: devflix
      POSTGRES_DB: devflix
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devflix -d devflix"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: devflix_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql://devflix:devflix@db:5432/devflix
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./api/src:/app/src
    command: npm run dev

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: devflix_front
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:5173"
    volumes:
      - ./front/src:/app/src
    environment:
      VITE_API_URL: http://localhost:3000
    command: npm run dev -- --host

volumes:
  postgres_data:
